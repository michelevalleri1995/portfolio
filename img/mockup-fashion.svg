  <rect x="840" y="110" width="320" height="280" fill="#d4c9bc"/>
  <rect x="840" y="410" width="320" height="280" fill="#1a1a1a"/>

  <!-- Fashion figure silhouette (simple) -->
  <!-- Main figure center panel -->
  <ellipse cx="690" cy="195" rx="30" ry="35" fill="#c4b8ac"/>
  <rect x="665" y="225" width="50" height="120" rx="4" fill="#b8a898"/>
  <rect x="655" y="345" width="30" height="130" rx="4" fill="#a89888"/>
  <rect x="695" y="345" width="30" height="130" rx="4" fill="#a89888"/>
  <!-- Dress overlay -->
  <path d="M660 240 Q690 260 720 240 L730 420 Q690 440 650 420 Z" fill="#c8bab0" opacity="0.6"/>

