  <rect x="0" y="680" width="1200" height="70" fill="#1a1a1a"/>
  <text x="200" y="720" text-anchor="middle" fill="#444" font-size="10" letter-spacing="3" font-family="Arial">ARTIGIANALE</text>
  <text x="460" y="720" text-anchor="middle" fill="#444" font-size="10" letter-spacing="3" font-family="Arial">SOSTENIBILE</text>
