  <!-- Page background -->
  <rect x="0" y="44" width="1200" height="706" fill="#f5f0eb"/>

  <defs>
    <linearGradient id="fadeLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5f0eb;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f5f0eb;stop-opacity:0"/>
