  <text x="855" y="530" fill="white" font-size="28" font-weight="300">Seta &amp;</text>
  <text x="855" y="565" fill="white" font-size="28" font-weight="300">Cashmere</text>
  <rect x="860" y="600" width="120" height="36" fill="white"/>
  <text x="920" y="623" text-anchor="middle" fill="#1a1a1a" font-size="10" letter-spacing="3" font-family="Arial">SCOPRI</text>

