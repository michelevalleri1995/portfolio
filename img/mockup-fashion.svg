  </defs>

  <!-- Nav -->
  <rect x="0" y="44" width="1200" height="60" fill="#f5f0eb"/>
  <text x="600" y="83" text-anchor="middle" fill="#1a1a1a" font-size="22" letter-spacing="12" font-family="Arial" font-weight="300">VELOUR</text>
  <text x="100" y="80" fill="#888" font-size="11" letter-spacing="3" font-family="Arial">COLLEZIONE</text>
  <text x="260" y="80" fill="#888" font-size="11" letter-spacing="3" font-family="Arial">ATELIER</text>
  <text x="820" y="80" fill="#888" font-size="11" letter-spacing="3" font-family="Arial">LOOKBOOK</text>
  <text x="980" y="80" fill="#888" font-size="11" letter-spacing="3" font-family="Arial">CONTATTI</text>
  <!-- thin line under nav -->
  <rect x="0" y="104" width="1200" height="1" fill="#ddd"/>

  <!-- Left editorial text -->
  <text x="60" y="200" fill="#bbb" font-size="11" letter-spacing="5" font-family="Arial">PRIMAVERA — ESTATE 2025</text>
  <text x="55" y="290" fill="#1a1a1a" font-size="64" font-weight="300" letter-spacing="-1">Silhouette</text>
  <text x="55" y="360" fill="#1a1a1a" font-size="64" font-weight="300" letter-spacing="-1">che parlano.</text>

  <rect x="60" y="390" width="40" height="2" fill="#1a1a1a"/>

  <text x="60" y="440" fill="#666" font-size="14" letter-spacing="1" font-family="Arial">Moda contemporanea italiana.</text>
  <text x="60" y="465" fill="#666" font-size="14" letter-spacing="1" font-family="Arial">Ogni capo è un'opera artigianale.</text>

  <rect x="60" y="510" width="150" height="46" fill="#1a1a1a"/>
  <text x="135" y="539" text-anchor="middle" fill="white" font-size="11" letter-spacing="3" font-family="Arial">ESPLORA</text>
