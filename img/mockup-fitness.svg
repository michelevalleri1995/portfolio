<svg width="1200" height="750" viewBox="0 0 1200 750" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Browser chrome -->
  <rect width="1200" height="750" rx="12" fill="#1a1a1a"/>
  <rect width="1200" height="44" rx="12" fill="#2d2d2d"/>
  <rect y="32" width="1200" height="12" fill="#2d2d2d"/>
  <circle cx="20" cy="22" r="7" fill="#ff5f57"/>
  <circle cx="44" cy="22" r="7" fill="#febc2e"/>
  <circle cx="68" cy="22" r="7" fill="#28c840"/>
  <rect x="120" y="10" width="760" height="24" rx="12" fill="#3a3a3a"/>
  <text x="500" y="26" text-anchor="middle" fill="#888" font-size="12">ironbunker.it</text>

  <!-- Page background -->
  <rect x="0" y="44" width="1200" height="706" fill="#0e0e0b"/>

  <defs>
