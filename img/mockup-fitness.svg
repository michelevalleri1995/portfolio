  <text x="660" y="615" fill="#2a3a1a" font-size="10" letter-spacing="4">MISSIONE</text>
  <text x="655" y="650" fill="#c8e88a" font-size="20" font-weight="900" letter-spacing="1">DIVENTARE</text>
  <text x="655" y="678" fill="#c8e88a" font-size="20" font-weight="900" letter-spacing="1">IMBATTIBILE.</text>
