  <rect x="650" y="290" width="230" height="120" fill="#111a0a" stroke="#2a3a1a" stroke-width="1"/>
  <text x="765" y="340" text-anchor="middle" fill="#c8e88a" font-size="42" font-weight="900">847</text>
  <text x="765" y="368" text-anchor="middle" fill="#3a5a1a" font-size="10" letter-spacing="3">ATLETI FORMATI</text>
  <rect x="900" y="290" width="230" height="120" fill="#111a0a" stroke="#2a3a1a" stroke-width="1"/>
  <text x="1015" y="340" text-anchor="middle" fill="#c8e88a" font-size="42" font-weight="900">90</text>
  <text x="1015" y="368" text-anchor="middle" fill="#3a5a1a" font-size="10" letter-spacing="3">GIORNI AL RISULTATO</text>

  <rect x="650" y="430" width="480" height="120" fill="#111a0a" stroke="#2a3a1a" stroke-width="1"/>
  <text x="660" y="468" fill="#3a5a1a" font-size="10" letter-spacing="3">PROGRAMMA ATTIVO</text>
  <text x="660" y="510" fill="#c8e88a" font-size="28" font-weight="900">OPERAZIONE MASSA</text>
