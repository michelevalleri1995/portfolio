  <text x="580" y="78" fill="#3a5a1a" font-size="11" letter-spacing="3">NUTRITION</text>
  <text x="720" y="78" fill="#3a5a1a" font-size="11" letter-spacing="3">SQUADRA</text>
  <text x="860" y="78" fill="#3a5a1a" font-size="11" letter-spacing="3">CONTATTI</text>
  <rect x="1040" y="58" width="120" height="34" fill="none" stroke="#3a5a1a" stroke-width="1"/>
  <text x="1100" y="80" text-anchor="middle" fill="#c8e88a" font-size="11" letter-spacing="2">ARRUOLATI</text>

  <!-- Hero left -->
  <text x="60" y="185" fill="#3a5a1a" font-size="10" letter-spacing="6">// UNITÀ DI ÉLITE — BERGAMO</text>

  <text x="55" y="265" fill="#c8e88a" font-size="78" font-weight="900" letter-spacing="-3">NO</text>
  <text x="55" y="350" fill="#c8e88a" font-size="78" font-weight="900" letter-spacing="-3">PAIN.</text>
  <text x="55" y="435" fill="#ffffff" font-size="78" font-weight="900" letter-spacing="-3">NO</text>
  <text x="55" y="520" fill="#ffffff" font-size="78" font-weight="900" letter-spacing="-3">GAIN.</text>

