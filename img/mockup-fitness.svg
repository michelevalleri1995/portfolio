    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2210" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect x="0" y="44" width="1200" height="706" fill="url(#militaryGrad)"/>
