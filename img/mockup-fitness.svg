  <rect x="60" y="615" width="170" height="46" fill="#3a5a1a"/>
  <text x="145" y="643" text-anchor="middle" fill="#c8e88a" font-size="11" font-weight="bold" letter-spacing="3">INIZIA IL PROGRAMMA</text>
